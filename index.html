<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any city</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter city name..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Search</button>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div id="currentWeather" class="current-weather hidden">
            <div class="weather-card">
                <div class="city-info">
                    <h2 id="cityName"></h2>
                    <p id="weatherDescription"></p>
                </div>
                <div class="weather-details">
                    <div class="temp-display">
                        <span id="temperature" class="temperature"></span>
                        <span class="unit">°F</span>
                    </div>
                    <div class="weather-icons">
                        <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                    </div>
                </div>
                <div class="additional-info">
                    <div class="info-box">
                        <span class="label">Humidity</span>
                        <span id="humidity" class="value"></span>
                    </div>
                    <div class="info-box">
                        <span class="label">Wind Speed</span>
                        <span id="windSpeed" class="value"></span>
                    </div>
                    <div class="info-box">
                        <span class="label">Feels Like</span>
                        <span id="feelsLike" class="value"></span>
                    </div>
                    <div class="info-box">
                        <span class="label">Pressure</span>
                        <span id="pressure" class="value"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="forecast" class="forecast hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecastContainer" class="forecast-container"></div>
        </div>

        <footer>
            <p>Data provided by OpenWeatherMap API</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
